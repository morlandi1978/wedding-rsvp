<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Wedding RSVP</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #b8966a;
      --gold-dark: #8a6c42;
      --ivory: #faf6f0;
      --charcoal: #2c2c2c;
      --mid-gray: #6b6560;
      --border: rgba(184,150,106,0.25);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Jost', sans-serif;
      background: var(--ivory);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      padding: 48px 44px;
      max-width: 380px;
      width: 100%;
      border-radius: 2px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.06);
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 300;
      font-style: italic;
      text-align: center;
      color: var(--charcoal);
      margin-bottom: 32px;
    }
    .field-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid-gray);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      color: var(--charcoal);
      background: var(--ivory);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold); background: #fff; }
    .btn {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 2px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--gold-dark); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      margin-top: 14px;
      font-size: 13px;
      color: #b85a5a;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">Area Riservata</p>
    <h1>Dashboard Admin</h1>
    <div class="field-group">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" />
    </div>
    <div class="field-group">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" />
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">Accedi</button>
    <p class="error-msg" id="error-msg">Credenziali non valide.</p>
  </div>

  <script>
    //const API_BASE = '/api';
	const API_BASE = 'http://localhost:8000/api';
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Accesso…';

      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      }).catch(() => null);

      if (res && res.ok) {
        const data = await res.json();
        localStorage.setItem('admin_token', data.access_token);
        window.location.href = 'dashboard.html';
      } else {
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Accedi';
      }
    }
  </script>
</body>
</html>
